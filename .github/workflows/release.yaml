name: Finelpy

on:
  push:
    branches:
      - main

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: 
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies on macos
        if: matrix.os == 'macos-latest'
        run: |
          brew install boost


      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel

      - name: Build wheels
        run: |
          python -m cibuildwheel --output-dir wheelhouse
        env:

          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
          CIBW_SKIP: "*musllinux*"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ARCHS_MACOS: auto
          CIBW_ARCHS_LINUX: auto

          CIBW_BEFORE_BUILD_LINUX: "pip install cmake scikit-build-core pybind11"
          CIBW_BEFORE_BUILD_MACOS: "brew install boost && pip install cmake scikit-build-core pybind11"
          CIBW_BEFORE_BUILD_WINDOWS: "pip install cmake scikit-build-core pybind11"

          CIBW_ENVIRONMENT: "DISABLE_CUDA=1"

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish_pypi:
      name: Upload wheels to PyPI
      needs: build_wheels
      runs-on: ubuntu-latest
      steps:

        - name: Download all wheels artifacts
          uses: actions/download-artifact@v4
          with:
            pattern: wheels-* # Baixa o artifact do ubuntu, windows e macos
            path: dist          # Salva todos na pasta dist/
            merge-multiple: true # Junta todos os arquivos .whl na mesma pasta

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Install Twine
          run: python -m pip install twine

        - name: Upload wheels to PyPI
          run: python -m twine upload dist/*
          env: 
            TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
            TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}